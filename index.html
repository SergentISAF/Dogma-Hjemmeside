<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/favicon-180.png">
  <meta name="description"
        data-en="Dogma Cables. Handmade audio cables. Coming this summer."
        data-da="Dogma Cables. Håndlavede lydkabler. Kommer denne sommer."
        content="Dogma Cables. Handmade audio cables. Coming this summer.">
  <title data-en="Dogma Cables — Coming this summer"
         data-da="Dogma Cables — Kommer denne sommer">Dogma Cables — Coming this summer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <script src="js/lang.js" defer></script>
</head>
<body class="theme-dark page-home">

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="header-logo" aria-label="Dogma Cables">
        <img src="img/dogma-logo.png" alt="Dogma Cables">
      </a>
      <div class="lang-switcher" aria-label="Language">
        <button data-lang="en" type="button">EN</button>
        <button data-lang="da" type="button">DA</button>
      </div>
    </div>
  </header>

  <main class="hero hero-image">
    <div class="hero-inner">
      <img src="img/dogma-logo.png" alt="Dogma Cables" class="hero-logo">
      <div class="hero-intro">
        <p class="contact-intro contact-intro-lead"
           data-en="Danish-made audio cables tailored to your needs."
           data-da="Dansk producerede Audio kabler skræddersyet til netop dit behov.">Danish-made audio cables tailored to your needs.</p>
        <p class="contact-intro"
           data-en="Every cable is handmade from the ground up using cotton, oil, wax and pure fine silver."
           data-da="Alle vores kabler er håndlavet fra bunden af bomuld, olie, voks og rent finsølv.">Every cable is handmade from the ground up using cotton, oil, wax and pure fine silver.</p>
        <p class="contact-intro"
           data-en="Get in touch to hear about the options."
           data-da="Kontakt os og hør om mulighederne.">Get in touch to hear about the options.</p>
      </div>
    </div>
  </main>

  <section class="contact home-contact" id="contact">
    <div class="container">
      <form class="contact-form" novalidate>
        <div>
          <label for="name" data-en="Name" data-da="Navn">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div>
          <label for="email" data-en="Email" data-da="E-mail">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div>
          <label for="message" data-en="Message" data-da="Besked">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <div class="form-status" role="status" aria-live="polite"></div>
        <button type="submit" data-en="Send" data-da="Send">Send</button>
      </form>

      <p class="contact-direct">
        <span data-en="Or write:" data-da="Eller skriv:">Or write:</span>
        <a href="mailto:contact@dogmacables.com">contact@dogmacables.com</a>
      </p>
    </div>
  </section>

  <footer>
    <hr class="footer-rule">
    <p data-en="Handmade with pride in Denmark" data-da="Håndlavet med stolthed i Danmark">Handmade with pride in Denmark</p>
    <p class="footer-copyright">&copy; 2026 Dogma Cables ApS</p>
  </footer>

  <script src="js/form.js"></script>
</body>
</html>
